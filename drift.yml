---
- name: Deploy /etc monitoring with Prometheus integration (RHEL 9)
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    monitor_script_path: /usr/local/bin/fim_monitor.py
    baseline_file: /var/lib/etc_baseline.json
    textfile_dir: /var/lib/node_exporter/textfile_collector
    run_interval: 60  # Run every 60 seconds
    dirs_to_monitor:
      - /etc
      - /home
  tasks:

    - name: Ensure Python3 is installed (RHEL 9 default)
      ansible.builtin.dnf:
        name: python3
        state: present

    - name: Ensure node_exporter user exists
      ansible.builtin.user:
        name: node_exporter
        system: yes
      ignore_errors: yes

    - name: Ensure textfile collector directory exists
      ansible.builtin.file:
        path: "{{ textfile_dir }}"
        state: directory
        owner: node_exporter
        group: node_exporter
        mode: '0755'

    - name: Deploy etc monitor script
      ansible.builtin.copy:
        src: files/drift.py
        dest: "{{ monitor_script_path }}"
        owner: root
        group: root
        mode: '0750'
## Its ok if baseline file does not exist, the script will create it on first run
    # - name: Ensure baseline file exists
    #   ansible.builtin.shell: "/usr/bin/python3 {{ monitor_script_path }} --dirs {{ dirs_to_monitor | join(' ') }}"
    #   ignore_errors: yes

    # - name: Create systemd service for etc monitor
    #   ansible.builtin.copy:
    #     dest: /etc/systemd/system/etc-monitor.service
    #     content: |
    #       [Unit]
    #       Description=/etc File Integrity Monitor
    #       After=network.target

    #       [Service]
    #       Type=oneshot
    #       ExecStart=/usr/bin/python3 {{ monitor_script_path }}

    - name: Create systemd timer for etc monitor every 2minutes
      ansible.builtin.copy:
        dest: /etc/systemd/system/fim-monitor.service
        content: |
          [Unit]
          Description=Continuous File Integrity Monitor for Prometheus
          After=network.target

          [Service]
          # Run as root to ensures read access to all /etc files
          User=root
          ExecStart=/usr/bin/python3 {{ monitor_script_path }} --dirs {{ dirs_to_monitor | join(' ') }} --interval {{ run_interval }}
          # FORCE RELOAD LOGIC:
          # When 'reload' is called, delete the baseline file.
          # The script will see the file is missing on its next check and regenerate it.
          ExecReload=/usr/bin/rm -f /var/lib/etc_baseline.json
          # After deleting, we send a SIGHUP to the script to wake it up if it's sleeping
          ExecReload=/bin/kill -HUP $MAINPID
          Restart=always
          RestartSec=60
          # Standardize logging
          StandardOutput=journal
          StandardError=inherit

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable and start timer
      ansible.builtin.systemd:
        name: fim-monitor.service
        enabled: yes
        state: restarted
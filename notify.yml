- name: Send Email Notification
  hosts: all
#  connection: local
  vars:
    # # SMTP Server Details
    # smtp_host: "smtp.gmail.com"
    # smtp_port: 587
    # smtp_user: "your-email@gmail.com"
    # smtp_pass: "your-app-password"  # Use Ansible Vault for this!
    
    # Email Content
    email_to: "admin@example.com"
    email_subject: "ALERT: File Integrity Deviation Detected"

  tasks:
    - name: Email Alert if fail server is unreachable
